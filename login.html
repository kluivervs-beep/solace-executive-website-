<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="login.meta.title">Inloggen | Solace Executive</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="assets/icons/monogram.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(180,146,61,0.10), transparent 60%),
      linear-gradient(180deg, #0B141B 0%, #0F1B24 55%, #0C161D 100%);
    padding: var(--space-4);
  }
  .login-wrap { width: 100%; max-width: 420px; }
  .login-lang { display: flex; justify-content: center; margin-bottom: var(--space-3); }
  .login-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin-bottom: var(--space-6);
  }
  .login-brand img { width: 34px; height: 34px; }
  .login-brand .brand-word { display: flex; flex-direction: column; line-height: 1; }
  .login-brand .brand-name { font-family: var(--font-display); font-size: 19px; letter-spacing: 0.16em; color: var(--color-ink); }
  .login-brand .brand-sub { font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.32em; color: var(--color-gold); margin-top: 3px; }

  .login-card {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-5);
  }
  .preview-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-gold-light);
    background: rgba(180, 146, 61, 0.12);
    border: 1px solid var(--color-gold-dim);
    padding: 6px 12px;
    border-radius: 20px;
    margin-bottom: var(--space-3);
  }
  .login-card h1 {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 500;
    color: var(--color-ink);
    margin-bottom: 8px;
  }
  .login-card > p {
    color: var(--color-ink-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: var(--space-4);
  }
  .login-actions { display: flex; flex-direction: column; gap: 10px; margin-top: var(--space-3); }
  .login-back {
    text-align: center;
    margin-top: var(--space-4);
    font-size: 13px;
    color: var(--color-ink-muted);
  }
  .login-back a { color: var(--color-gold-light); text-decoration: underline; text-underline-offset: 3px; }
  .login-error {
    font-size: 13px;
    color: #E08167;
    margin-bottom: var(--space-3);
    display: none;
  }
  .login-error.is-visible { display: block; }
  .login-success {
    font-size: 13px;
    color: #9AC79A;
    margin-bottom: var(--space-3);
    display: none;
  }
  .login-success.is-visible { display: block; }
  .login-forgot-link { text-align: center; margin-top: var(--space-3); font-size: 13px; }
  .login-forgot-link a { color: var(--color-gold-light); text-decoration: underline; text-underline-offset: 3px; }
  .login-forgot-sub { color: var(--color-ink-muted); font-size: 13.5px; line-height: 1.6; margin-bottom: var(--space-3); }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-lang lang-switch" role="group" aria-label="Taal / Language">
    <button type="button" class="lang-btn" data-lang="nl">NL</button>
    <button type="button" class="lang-btn" data-lang="en">EN</button>
  </div>

  <a href="index.html" class="login-brand" aria-label="Solace Executive">
    <img src="assets/icons/monogram.svg" alt="">
    <span class="brand-word">
      <span class="brand-name">SOLACE</span>
      <span class="brand-sub">EXECUTIVE</span>
    </span>
  </a>

  <div class="login-card">
    <h1 data-i18n="login.title">Ledenportaal</h1>
    <p data-i18n="login.sub">
      Log in met de gegevens die u van ons heeft ontvangen.
    </p>

    <p class="login-error" id="loginError" role="alert"></p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email" data-i18n="login.email">E-mail</label>
        <input type="email" id="email" name="email" autocomplete="email" required data-i18n="login.email.placeholder" data-i18n-attr="placeholder" placeholder="naam@voorbeeld.nl">
      </div>
      <div class="field">
        <label for="password" data-i18n="login.password">Wachtwoord</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
      </div>

      <div class="login-actions">
        <button type="submit" class="btn btn-primary btn-wide" id="loginSubmit" data-i18n="login.submit">Inloggen</button>
      </div>
    </form>

    <p class="login-forgot-link"><a href="#" id="forgotLink" data-i18n="login.forgot.link">Wachtwoord vergeten?</a></p>

    <form id="forgotForm" novalidate hidden>
      <p class="login-forgot-sub" data-i18n="login.forgot.sub">Vul uw e-mailadres in, dan sturen we u een link om een nieuw wachtwoord in te stellen.</p>
      <p class="login-error" id="forgotError" role="alert"></p>
      <p class="login-success" id="forgotSuccess" data-i18n="login.forgot.success">Check uw inbox voor de reset-link.</p>
      <div class="field">
        <label for="forgotEmail" data-i18n="login.email">E-mail</label>
        <input type="email" id="forgotEmail" name="forgotEmail" autocomplete="email" required placeholder="naam@voorbeeld.nl">
      </div>
      <div class="login-actions">
        <button type="submit" class="btn btn-primary btn-wide" id="forgotSubmit" data-i18n="login.forgot.submit">Verstuur reset-link</button>
      </div>
      <p class="login-forgot-link"><a href="#" id="backToLoginLink" data-i18n="login.forgot.back">&larr; Terug naar inloggen</a></p>
    </form>

    <p class="login-back" data-i18n-html="login.back">Nog geen lid? <a href="index.html#lidmaatschap">Neem contact op</a></p>
  </div>
</div>

<script src="i18n.js"></script>
<script type="module">
  import { supabase } from './supabase-client.js';

  const form = document.getElementById('loginForm');
  const errorEl = document.getElementById('loginError');
  const submitBtn = document.getElementById('loginSubmit');
  const t = (key) => (window.SolaceI18n ? window.SolaceI18n.t(key) : key);

  // Already signed in? Skip straight to the dashboard.
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.classList.remove('is-visible');
    submitBtn.disabled = true;
    submitBtn.textContent = t('login.submitting');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorEl.textContent = t('login.error');
      errorEl.classList.add('is-visible');
      submitBtn.disabled = false;
      submitBtn.textContent = t('login.submit');
      return;
    }

    window.location.href = 'dashboard.html';
  });

  // --- Forgot password ---
  const forgotLink = document.getElementById('forgotLink');
  const backToLoginLink = document.getElementById('backToLoginLink');
  const forgotForm = document.getElementById('forgotForm');
  const forgotError = document.getElementById('forgotError');
  const forgotSuccess = document.getElementById('forgotSuccess');
  const forgotSubmit = document.getElementById('forgotSubmit');

  forgotLink.addEventListener('click', (e) => {
    e.preventDefault();
    form.hidden = true;
    document.querySelector('.login-forgot-link').hidden = true;
    forgotForm.hidden = false;
  });

  backToLoginLink.addEventListener('click', (e) => {
    e.preventDefault();
    forgotForm.hidden = true;
    forgotError.classList.remove('is-visible');
    forgotSuccess.classList.remove('is-visible');
    form.hidden = false;
    document.querySelector('.login-forgot-link').hidden = false;
  });

  forgotForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    forgotError.classList.remove('is-visible');
    forgotSuccess.classList.remove('is-visible');
    forgotSubmit.disabled = true;
    forgotSubmit.textContent = t('login.submitting');

    const email = document.getElementById('forgotEmail').value.trim();
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: `${window.location.origin}/reset-password.html`,
    });

    forgotSubmit.disabled = false;
    forgotSubmit.textContent = t('login.forgot.submit');

    if (error) {
      forgotError.textContent = t('login.forgot.error');
      forgotError.classList.add('is-visible');
      return;
    }

    forgotSuccess.classList.add('is-visible');
    forgotForm.querySelector('.field').hidden = true;
    forgotSubmit.hidden = true;
  });
</script>

</body>
</html>
